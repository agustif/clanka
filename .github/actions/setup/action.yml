name: Setup
description: Perform standard setup and install dependencies using Bun.

runs:
  using: composite
  steps:
    - name: Install Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: 1.3.9
    - name: Install dependencies
      shell: bash
      run: bun install --frozen-lockfile --no-verify
